<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0b">
<title>Kävelyohjelma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface-2: #1c1c1f;
    --border: #26262b;
    --text: #f5f5f7;
    --text-dim: #8a8a92;
    --accent: #7cffb2;
    --accent-dim: #2d6a47;
    --hill: #ff8a3a;
    --tempo: #ffd23a;
    --poles: #4a9eff;
    --long: #b56bff;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; overscroll-behavior: none; }
  body { padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px) 0; max-width: 600px; margin: 0 auto; }

  header { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 {
    font-family: 'Anton', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    line-height: 0.95;
    text-transform: uppercase;
  }
  h1 .accent { color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 13px; font-weight: 500; margin-top: 6px; letter-spacing: 0.3px; }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn svg { width: 18px; height: 18px; }

  .progress-block {
    margin-top: 22px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 18px;
    align-items: center;
  }
  .ring { position: relative; width: 72px; height: 72px; }
  .ring svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--border); }
  .ring-fg { stroke: var(--accent); transition: stroke-dashoffset 0.6s cubic-bezier(.2,.7,.2,1); }
  .ring-text {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: 1px;
  }
  .progress-info .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .progress-info .stat { font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 1px; margin-top: 2px; }
  .progress-info .total { color: var(--text-dim); font-size: 18px; }

  .week-tabs {
    display: flex;
    gap: 8px;
    padding: 18px 24px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .week-tabs::-webkit-scrollbar { display: none; }
  .week-tab {
    flex: 1 0 auto;
    min-width: 0;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .week-tab .wk-num { font-family: 'Anton', sans-serif; font-size: 20px; letter-spacing: 1px; display: block; line-height: 1; margin-bottom: 4px; }
  .week-tab .wk-prog { font-size: 10px; opacity: 0.85; letter-spacing: 1.2px; text-transform: uppercase; }
  .week-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .week-tab.active .wk-prog { opacity: 1; }
  .week-tab.complete:not(.active) { border-color: var(--accent-dim); color: var(--accent); }

  main { padding: 18px 24px 0; }

  .workout {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .workout:active { transform: scale(0.985); }
  .workout::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--type-color, var(--accent));
  }
  .workout.done { background: var(--surface-2); border-color: var(--accent-dim); }
  .workout.done .workout-title { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--accent-dim); text-decoration-thickness: 2px; }
  .workout.done .workout-day { color: var(--accent); }

  .workout-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .workout-day { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
  .workout-title {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    margin-top: 4px;
    line-height: 1.05;
    text-transform: uppercase;
  }
  .workout-meta { margin-top: 10px; display: flex; gap: 14px; font-size: 13px; color: var(--text-dim); font-weight: 500; flex-wrap: wrap; align-items: center; }
  .workout-meta span { display: flex; align-items: center; gap: 5px; }
  .zone-pill {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: var(--type-color);
    color: #000;
  }

  .check {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .workout.done .check { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 16px; height: 16px; opacity: 0; transition: opacity 0.2s ease; }
  .workout.done .check svg { opacity: 1; }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 100; display: none;
    align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%; max-width: 600px;
    border-radius: 24px 24px 0 0;
    padding: 24px 24px calc(env(safe-area-inset-bottom) + 24px);
    max-height: 88vh; overflow-y: auto;
    border-top: 1px solid var(--border);
    animation: slideUp 0.28s cubic-bezier(.2,.7,.2,1);
    position: relative;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: -8px auto 18px; }
  .modal h2 { font-family: 'Anton', sans-serif; font-size: 30px; letter-spacing: 1px; text-transform: uppercase; line-height: 1; }
  .modal .badge {
    display: inline-block; padding: 5px 10px; border-radius: 6px;
    font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 10px; background: var(--type-color); color: #000;
  }
  .modal-meta {
    display: flex; gap: 18px; margin-top: 14px; padding: 14px 0;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .modal-meta div { flex: 1; }
  .modal-meta .k { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .modal-meta .v { font-family: 'Anton', sans-serif; font-size: 22px; margin-top: 4px; }

  .modal-section { margin-top: 18px; }
  .modal-section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.8px; font-weight: 800; margin-bottom: 10px; }
  .step {
    background: var(--surface-2);
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .step-num { font-family: 'Anton', sans-serif; color: var(--type-color); font-size: 20px; line-height: 1.05; min-width: 50px; }
  .step-num small { display: block; font-family: 'Manrope', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); margin-top: 2px; }
  .step-body { flex: 1; }
  .step-text { font-size: 14px; line-height: 1.45; }
  .step-text strong { color: var(--type-color); }
  .step-zone { margin-top: 6px; font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.4px; }
  .step-zone .z { color: var(--type-color); font-weight: 800; }

  .modal-tip {
    background: rgba(124, 255, 178, 0.08);
    border: 1px solid var(--accent-dim);
    border-radius: 12px;
    padding: 14px;
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.5;
    color: #d4d4d8;
  }
  .modal-tip strong { color: var(--accent); font-weight: 800; }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary.done-state { background: var(--surface-2); color: var(--accent); border: 1px solid var(--accent-dim); }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-block { width: 100%; margin-top: 10px; }

  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field-hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.45; }

  .guide-template {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .guide-template-name {
    font-family: 'Anton', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    color: var(--accent);
  }
  .guide-template-step {
    font-size: 13px;
    line-height: 1.6;
    color: #d4d4d8;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .guide-template-step:last-child { border-bottom: none; padding-bottom: 0; }
  .guide-template-step b { color: var(--text); }

  footer { margin-top: 30px; padding: 18px 24px; text-align: center; color: var(--text-dim); font-size: 12px; }
  footer button {
    background: none; border: none; color: var(--text-dim);
    font-family: inherit; font-size: 12px;
    text-decoration: underline; cursor: pointer; padding: 8px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 30px);
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--accent); color: #000;
    padding: 12px 20px; border-radius: 12px;
    font-weight: 700; font-size: 14px; letter-spacing: 0.5px;
    transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
    z-index: 200;
    box-shadow: 0 8px 24px rgba(124,255,178,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>KÄVELY<br><span class="accent">OHJELMA</span></h1>
      <button class="icon-btn" id="settingsBtn" aria-label="Asetukset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="subtitle">4 viikkoa · 16 treeniä · Sykealueet Z1–Z4</div>
    <div class="progress-block">
      <div class="ring">
        <svg width="72" height="72">
          <circle class="ring-bg" cx="36" cy="36" r="30" fill="none" stroke-width="6"/>
          <circle id="progressRing" class="ring-fg" cx="36" cy="36" r="30" fill="none" stroke-width="6" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <div class="ring-text" id="progressPct">0%</div>
      </div>
      <div class="progress-info">
        <div class="label">Suoritettu</div>
        <div class="stat"><span id="doneCount">0</span><span class="total">/16</span></div>
      </div>
    </div>
  </header>

  <div class="week-tabs" id="weekTabs"></div>
  <main id="workoutList"></main>

  <footer>
    <button id="resetBtn">Nollaa edistyminen</button>
  </footer>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div id="modalContent"></div>
    </div>
  </div>

  <div class="toast" id="toast">Treeni merkitty tehdyksi 💪</div>

<script>
const PROGRAM = [
  // Week 1
  { id: 'w1d1', week: 1, day: 'Maanantai', type: 'hill', title: 'Mäkikävely', duration: 50, intensity: 'Kova', primaryZone: 'Z3',
    steps: [
      { n: 10, t: '<strong>Lämmittely</strong> tasaisella reippaasti', zone: 'Z2' },
      { n: 30, t: '<strong>Mäkistä reittiä tai porraskävelyä</strong> – nousut reippaasti, laskut palauttaen', zone: 'Z3' },
      { n: 10, t: '<strong>Jäähdyttely</strong> tasaisesti', zone: 'Z1' }
    ],
    tip: 'Mäkikävely on kävelijän intervallitreeni. Etsi reitti, jolla on edes muutama selkeä nousu. Kuntoportaat toimivat erinomaisesti jos sellaiset löytyvät lähistöltä.' },
  { id: 'w1d3', week: 1, day: 'Keskiviikko', type: 'tempo', title: 'Tehokävely', duration: 55, intensity: 'Reipas', primaryZone: 'Z2-Z3',
    steps: [
      { n: 5, t: '<strong>Lämmittely</strong> rauhallisesti', zone: 'Z1' },
      { n: 45, t: '<strong>Reipas tahti 6,0–6,5 km/h</strong> – tasainen hengästys koko ajan', zone: 'Z2-Z3' },
      { n: 5, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: 'Tasainen reitti, ei pysähdyksiä. Tavoittele tahtia, jolla pystyt puhumaan lyhyitä lauseita mutta et keskustelemaan rennosti.' },
  { id: 'w1d5', week: 1, day: 'Perjantai', type: 'poles', title: 'Sauvakävely', duration: 60, intensity: 'Keskitaso', primaryZone: 'Z2',
    steps: [
      { n: 60, t: '<strong>Sauvakävely</strong> – aktivoi yläkroppa, työnnä sauvoilla rytmikkäästi', zone: 'Z2' }
    ],
    tip: 'Jos sauvoja ei vielä ole, tämä on ainoa ostoksen arvoinen treenivaruste. Polttaa 20–40 % enemmän kaloreita kuin tavallinen kävely. Korvaa tarvittaessa reippaalla 60 min kävelyllä.' },
  { id: 'w1d7', week: 1, day: 'Sunnuntai', type: 'long', title: 'Pitkä kävely', duration: 75, intensity: 'Kevyt', primaryZone: 'Z2',
    steps: [
      { n: 75, t: '<strong>Rauhallinen pitkä kävely</strong> – juttele puhelimessa, kuuntele podcastia', zone: 'Z2' }
    ],
    tip: 'Viikon paras kaloripoltto kestonsa vuoksi. Voit ottaa kahvitauon puolessa välissä jos reitti sallii.' },

  // Week 2
  { id: 'w2d1', week: 2, day: 'Maanantai', type: 'hill', title: 'Mäkikävely', duration: 60, intensity: 'Kova', primaryZone: 'Z3',
    steps: [
      { n: 10, t: '<strong>Lämmittely</strong> tasaisella', zone: 'Z2' },
      { n: 40, t: '<strong>Mäkistä reittiä</strong> – pidempi mäkiosio', zone: 'Z3' },
      { n: 10, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: '10 min lisää mäkiosioon. Tavoittele 4–6 hyvää nousua, joissa syke käy Z3:ssa.' },
  { id: 'w2d3', week: 2, day: 'Keskiviikko', type: 'tempo', title: 'Tehokävely', duration: 60, intensity: 'Reipas', primaryZone: 'Z2-Z3',
    steps: [
      { n: 5, t: '<strong>Lämmittely</strong>', zone: 'Z1' },
      { n: 50, t: '<strong>Reipas tahti</strong> – 5 min pidempi reipas osuus', zone: 'Z2-Z3' },
      { n: 5, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: 'Sama vauhti kuin viikolla 1, vain pidempi kesto. Helpotuvat askeleet kertovat että olet jo vahvistunut.' },
  { id: 'w2d5', week: 2, day: 'Perjantai', type: 'poles', title: 'Sauvakävely', duration: 65, intensity: 'Keskitaso', primaryZone: 'Z2',
    steps: [
      { n: 65, t: '<strong>Sauvakävely</strong> – ryhdikkäästi, sauvojen työntö aktiivinen', zone: 'Z2' }
    ],
    tip: 'Kiinnitä huomio tekniikkaan: sauva osuu maahan jalan kantaiskun kohdalla, työntö viedään lonkan taakse. Hyvä tekniikka kuormittaa myös vatsa- ja selkälihaksia.' },
  { id: 'w2d7', week: 2, day: 'Sunnuntai', type: 'long', title: 'Pitkä kävely', duration: 85, intensity: 'Kevyt', primaryZone: 'Z2',
    steps: [
      { n: 85, t: '<strong>Pitkä rauhallinen kävely</strong>', zone: 'Z2' }
    ],
    tip: '10 min lisäystä. Tämä on viikon kovin kaloripoltto – noin 500–550 kcal.' },

  // Week 3
  { id: 'w3d1', week: 3, day: 'Maanantai', type: 'hill', title: 'Mäkikävely + reppu', duration: 60, intensity: 'Kova', primaryZone: 'Z3-Z4',
    steps: [
      { n: 10, t: '<strong>Lämmittely</strong> tasaisella', zone: 'Z2' },
      { n: 40, t: '<strong>Mäkistä reittiä reppukuormalla 5–8 kg</strong>', zone: 'Z3-Z4' },
      { n: 10, t: '<strong>Jäähdyttely</strong> ilman reppua jos mahdollista', zone: 'Z1' }
    ],
    tip: 'Reppukuorma (rucking) nostaa kalorinpolton lähes juoksutasolle. Aloita 5 kg:lla – kirjat, vesipullot tai hiekkasäkki. Sovita rinkka tiiviisti.' },
  { id: 'w3d3', week: 3, day: 'Keskiviikko', type: 'tempo', title: 'Tehokävely', duration: 60, intensity: 'Reipas', primaryZone: 'Z3',
    steps: [
      { n: 5, t: '<strong>Lämmittely</strong>', zone: 'Z1' },
      { n: 50, t: '<strong>Reippaampi tahti 6,5+ km/h</strong> – nostetaan tehoa hieman', zone: 'Z3' },
      { n: 5, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: 'Yritä pitää syke pääosin Z3:ssa. Tämä vaatii noin 6,5–7 km/h tahdin tasaisella maalla – jo melkein juoksun rajoilla, mutta askeleet pysyvät kävelyssä.' },
  { id: 'w3d5', week: 3, day: 'Perjantai', type: 'poles', title: 'Sauvakävely + mäet', duration: 65, intensity: 'Keskitaso', primaryZone: 'Z2-Z3',
    steps: [
      { n: 65, t: '<strong>Sauvakävely vaihtelevassa maastossa</strong> – sauvojen työntö korostuu nousuissa', zone: 'Z2-Z3' }
    ],
    tip: 'Yhdistetään sauvakävely ja mäkinen reitti. Sauvat helpottavat nousuja ja säästävät polvia laskuissa.' },
  { id: 'w3d7', week: 3, day: 'Sunnuntai', type: 'long', title: 'Pitkä kävely', duration: 90, intensity: 'Kevyt', primaryZone: 'Z2',
    steps: [
      { n: 90, t: '<strong>Pitkä rauhallinen kävely</strong> – ota mukaan vesipullo', zone: 'Z2' }
    ],
    tip: '1,5 tunnin lenkki. Hyvä reitti, hyvä sää – tästä saa nautinnollisen retken eikä pelkkää treeniä.' },

  // Week 4
  { id: 'w4d1', week: 4, day: 'Maanantai', type: 'hill', title: 'Mäkikävely + reppu', duration: 65, intensity: 'Kova', primaryZone: 'Z3-Z4',
    steps: [
      { n: 10, t: '<strong>Lämmittely</strong>', zone: 'Z2' },
      { n: 45, t: '<strong>Mäkistä reittiä reppukuormalla 8–10 kg</strong>', zone: 'Z3-Z4' },
      { n: 10, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: 'Lisää kuormaa edellisestä viikosta. 10 kg reppu mäessä = juoksun veroinen sykevaste ilman juoksun nivelkuormaa.' },
  { id: 'w4d3', week: 4, day: 'Keskiviikko', type: 'tempo', title: 'Tehokävely', duration: 65, intensity: 'Reipas', primaryZone: 'Z3',
    steps: [
      { n: 5, t: '<strong>Lämmittely</strong>', zone: 'Z1' },
      { n: 55, t: '<strong>Reipas tahti</strong> – pisin tehokävely ohjelmassa', zone: 'Z3' },
      { n: 5, t: '<strong>Jäähdyttely</strong>', zone: 'Z1' }
    ],
    tip: 'Tämä on kestävyyden todellinen testi. 55 min Z3:ssa tasaisesti rakentaa aerobista pohjaa tehokkaasti.' },
  { id: 'w4d5', week: 4, day: 'Perjantai', type: 'poles', title: 'Sauvakävely', duration: 70, intensity: 'Keskitaso', primaryZone: 'Z2',
    steps: [
      { n: 70, t: '<strong>Pidempi sauvakävely</strong>', zone: 'Z2' }
    ],
    tip: 'Lataudu sunnuntain pitkälle lenkille rauhallisesti.' },
  { id: 'w4d7', week: 4, day: 'Sunnuntai', type: 'long', title: 'Pitkä kävely', duration: 100, intensity: 'Kevyt', primaryZone: 'Z2',
    steps: [
      { n: 100, t: '<strong>Pisin lenkki ohjelmassa</strong> – n. 10 km mukavalla tahdilla', zone: 'Z2' }
    ],
    tip: 'Ohjelman finaali. Tämän jälkeen olet kävellyt 4 viikossa noin 17 tuntia ja polttanut karkeasti 6000–7000 kcal pelkästä liikunnasta. Tarkista Garminin VO2max ja kuntoikä – kumpikin pitäisi olla parempi.' },
];

const TYPE_COLORS = { hill: 'var(--hill)', tempo: 'var(--tempo)', poles: 'var(--poles)', long: 'var(--long)' };
const TYPE_LABELS = { hill: 'Mäkikävely', tempo: 'Tehokävely', poles: 'Sauvakävely', long: 'Pitkä lenkki' };
const ZONES = {
  'Z1': [0.50, 0.60], 'Z2': [0.60, 0.72], 'Z3': [0.72, 0.82],
  'Z4': [0.82, 0.92], 'Z5': [0.92, 1.00]
};
const DAY_OFFSETS = { 'Maanantai': 0, 'Keskiviikko': 2, 'Perjantai': 4, 'Sunnuntai': 6 };

let state = { done: {}, currentWeek: 1, startDate: null, maxHR: 188, workoutTime: '20:30' };

function nextMonday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 1 : (8 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

async function loadState() {
  try {
    const r = await window.storage.get('walker-state');
    if (r && r.value) state = { ...state, ...JSON.parse(r.value) };
  } catch(e) { /* first run */ }
  if (!state.startDate) state.startDate = nextMonday();
  const weeks = [1,2,3,4];
  const firstUnfinished = weeks.find(w => PROGRAM.filter(x => x.week === w).some(x => !state.done[x.id]));
  if (firstUnfinished) state.currentWeek = firstUnfinished;
}

async function saveState() {
  try { await window.storage.set('walker-state', JSON.stringify(state)); }
  catch(e) { console.error('Tallennus epäonnistui', e); }
}

function bpmRange(zoneStr) {
  if (!ZONES[zoneStr]) return null;
  const [lo, hi] = ZONES[zoneStr];
  return [Math.round(lo * state.maxHR), Math.round(hi * state.maxHR)];
}

function zoneDisplay(zoneStr) {
  if (zoneStr.includes('-')) {
    const [first, last] = zoneStr.split('-');
    const lo = bpmRange(first); const hi = bpmRange(last);
    if (lo && hi) return `<span class="z">${zoneStr}</span> · ${lo[0]}–${hi[1]} bpm`;
  }
  const r = bpmRange(zoneStr);
  if (r) return `<span class="z">${zoneStr}</span> · ${r[0]}–${r[1]} bpm`;
  return `<span class="z">${zoneStr}</span>`;
}

function totalDone() { return Object.values(state.done).filter(Boolean).length; }
function weekDone(w) { return PROGRAM.filter(x => x.week === w && state.done[x.id]).length; }

function render() {
  const total = PROGRAM.length;
  const done = totalDone();
  const pct = done / total;
  const circ = 2 * Math.PI * 30;
  document.getElementById('progressRing').setAttribute('stroke-dashoffset', circ - circ * pct);
  document.getElementById('progressPct').textContent = Math.round(pct * 100) + '%';
  document.getElementById('doneCount').textContent = done;

  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  for (let w = 1; w <= 4; w++) {
    const wd = weekDone(w);
    const wt = PROGRAM.filter(x => x.week === w).length;
    const tab = document.createElement('div');
    tab.className = 'week-tab' + (state.currentWeek === w ? ' active' : '') + (wd === wt ? ' complete' : '');
    tab.innerHTML = `<span class="wk-num">VK ${w}</span><span class="wk-prog">${wd}/${wt}</span>`;
    tab.onclick = () => { state.currentWeek = w; render(); };
    tabs.appendChild(tab);
  }

  const list = document.getElementById('workoutList');
  list.innerHTML = '';
  PROGRAM.filter(x => x.week === state.currentWeek).forEach(w => {
    const el = document.createElement('div');
    el.className = 'workout' + (state.done[w.id] ? ' done' : '');
    el.style.setProperty('--type-color', TYPE_COLORS[w.type]);
    el.innerHTML = `
      <div class="workout-head">
        <div>
          <div class="workout-day">${w.day}</div>
          <div class="workout-title">${w.title}</div>
          <div class="workout-meta">
            <span>⏱ ${w.duration} min</span>
            <span class="zone-pill">${w.primaryZone}</span>
          </div>
        </div>
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    `;
    el.onclick = () => openWorkoutModal(w);
    list.appendChild(el);
  });
}

function openWorkoutModal(w) {
  const c = document.getElementById('modalContent');
  const isDone = !!state.done[w.id];
  c.innerHTML = `
    <span class="badge" style="background:${TYPE_COLORS[w.type]}">${TYPE_LABELS[w.type]}</span>
    <h2>${w.title}</h2>
    <div class="modal-meta">
      <div><div class="k">Päivä</div><div class="v">${w.day.slice(0,3).toUpperCase()}</div></div>
      <div><div class="k">Kesto</div><div class="v">${w.duration} min</div></div>
      <div><div class="k">Pääsyke</div><div class="v">${w.primaryZone}</div></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Suoritus</div>
      ${w.steps.map(s => `
        <div class="step" style="--type-color:${TYPE_COLORS[w.type]}">
          <div class="step-num">${s.n}<small>min</small></div>
          <div class="step-body">
            <div class="step-text">${s.t}</div>
            <div class="step-zone">${zoneDisplay(s.zone)}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="modal-tip"><strong>Vinkki:</strong> ${w.tip}</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Sulje</button>
      <button class="btn btn-primary ${isDone ? 'done-state' : ''}" onclick="toggleDone('${w.id}')">${isDone ? '✓ Tehty' : 'Merkitse tehdyksi'}</button>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}

function openSettingsModal() {
  const c = document.getElementById('modalContent');
  c.innerHTML = `
    <h2>Asetukset</h2>
    <div style="margin-top:18px">
      <div class="field">
        <label class="field-label">Aloituspäivä (VK 1, Maanantai)</label>
        <input type="date" id="setStartDate" value="${state.startDate}">
        <div class="field-hint">Ohjelman ensimmäinen treeni alkaa tästä päivästä.</div>
      </div>
      <div class="field">
        <label class="field-label">Treenin alkuaika</label>
        <input type="time" id="setWorkoutTime" value="${state.workoutTime}">
        <div class="field-hint">Käytetään kalenterivientiin.</div>
      </div>
      <div class="field">
        <label class="field-label">Maksimisykkeesi</label>
        <input type="number" id="setMaxHR" min="140" max="220" value="${state.maxHR}">
        <div class="field-hint">Garmin näyttää tämän käyttäjäprofiilissa. Oletus 188 (kaava 220−ikä, 32v).</div>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveSettings()">Tallenna</button>
    <div class="modal-section" style="margin-top:24px">
      <div class="modal-section-title">Garmin & kalenteri</div>
      <button class="btn btn-secondary btn-block" onclick="downloadICS()">📅 Lataa kalenteri (.ics)</button>
      <div class="field-hint" style="margin-top:8px">Vie 16 treeniä iPhonen kalenteriin oikeille päiville. Muistutus 30 min ennen.</div>
      <button class="btn btn-secondary btn-block" onclick="openGarminGuide()">⌚ Garmin Connect -ohjeet</button>
      <div class="field-hint" style="margin-top:8px">Sykealueet ja kävelyaktiviteetin valinta kellosta.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Sulje</button>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}

async function saveSettings() {
  state.startDate = document.getElementById('setStartDate').value;
  state.workoutTime = document.getElementById('setWorkoutTime').value;
  state.maxHR = parseInt(document.getElementById('setMaxHR').value) || 188;
  await saveState();
  closeModal();
  render();
  showToast('Asetukset tallennettu');
}

function openGarminGuide() {
  const c = document.getElementById('modalContent');
  const z = (zone) => {
    const r = bpmRange(zone);
    return r ? `${zone} (${r[0]}–${r[1]} bpm)` : zone;
  };
  c.innerHTML = `
    <h2>Garmin & kävely</h2>
    <div class="modal-tip" style="margin-top:14px">
      <strong>Aktiviteetit kellosta:</strong> Valitse "Kävely" tai "Sauvakävely" ennen treeniä. Sykevyö (HRM) yhdistyy automaattisesti. Mäkikävely ja reppukävely tallennetaan myös tavallisena kävelyaktiviteettina – Garmin tunnistaa nousut korkeusmittarilla.
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Sykealueet (max ${state.maxHR} bpm)</div>

      <div class="guide-template">
        <div class="guide-template-name" style="color:#7cffb2">Z1 · Palauttava</div>
        <div class="guide-template-step"><b>${z('Z1').replace('Z1 ', '')}</b> · Hyvin kevyt – pystyt laulamaan</div>
      </div>

      <div class="guide-template">
        <div class="guide-template-name" style="color:#7cffb2">Z2 · Peruskestävyys</div>
        <div class="guide-template-step"><b>${z('Z2').replace('Z2 ', '')}</b> · Reipas kävely – pystyt keskustelemaan</div>
      </div>

      <div class="guide-template">
        <div class="guide-template-name" style="color:#ffd23a">Z3 · Vauhtikestävyys</div>
        <div class="guide-template-step"><b>${z('Z3').replace('Z3 ', '')}</b> · Tehokävely tai mäki – lyhyitä lauseita</div>
      </div>

      <div class="guide-template">
        <div class="guide-template-name" style="color:#ff8a3a">Z4 · Maksimikestävyys</div>
        <div class="guide-template-step"><b>${z('Z4').replace('Z4 ', '')}</b> · Jyrkkä mäki tai reppu+mäki – yksittäisiä sanoja</div>
      </div>
    </div>
    <div class="modal-tip">
      <strong>Tärkein luku:</strong> 80 % kävelystäsi pitäisi olla Z2:ssa, 15 % Z3:ssa ja 5 % Z4:ssä. Tämä on klassinen polarisoitu jakauma joka rakentaa kestävyyttä optimaalisesti. Tämä ohjelma noudattaa juuri tätä jakaumaa.
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal()">Selvä</button>
    </div>
  `;
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatICSDate(date) {
  return `${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}00`;
}

function generateICS() {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Kavelyohjelma//FI',
    'CALSCALE:GREGORIAN'
  ];
  const [sh, sm] = state.workoutTime.split(':').map(Number);
  const stamp = formatICSDate(new Date());

  PROGRAM.forEach(w => {
    const offset = (w.week - 1) * 7 + DAY_OFFSETS[w.day];
    const dt = new Date(state.startDate + 'T00:00:00');
    dt.setDate(dt.getDate() + offset);
    dt.setHours(sh, sm, 0, 0);
    const end = new Date(dt.getTime() + (w.duration + 5) * 60000);

    const desc = w.steps.map(s => `[${s.n} min] ${s.t.replace(/<[^>]+>/g,'')} (${s.zone})`).join('\\n') + '\\n\\nVinkki: ' + w.tip;

    lines.push(
      'BEGIN:VEVENT',
      `UID:${w.id}-${stamp}@kavelyohjelma`,
      `DTSTAMP:${stamp}`,
      `DTSTART:${formatICSDate(dt)}`,
      `DTEND:${formatICSDate(end)}`,
      `SUMMARY:🚶 ${w.title} (${w.duration} min · ${w.primaryZone})`,
      `DESCRIPTION:${desc}`,
      'BEGIN:VALARM',
      'TRIGGER:-PT30M',
      'ACTION:DISPLAY',
      `DESCRIPTION:Kavely 30 min: ${w.title}`,
      'END:VALARM',
      'END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS() {
  const ics = generateICS();
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kavelyohjelma.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Kalenteri ladattu 📅');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

async function toggleDone(id) {
  const wasNotDone = !state.done[id];
  state.done[id] = !state.done[id];
  await saveState();
  closeModal();
  render();
  if (wasNotDone) showToast('Treeni merkitty tehdyksi 💪');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (msg) t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
document.getElementById('modalBg').addEventListener('click', (e) => { if (e.target.id === 'modalBg') closeModal(); });
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (confirm('Nollataanko kaikki edistyminen? Tätä ei voi peruuttaa.')) {
    state.done = {};
    state.currentWeek = 1;
    await saveState();
    render();
  }
});

(async () => { await loadState(); render(); })();
</script>
